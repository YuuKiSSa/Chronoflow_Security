# App secrets for chronoflow namespace.
# Option 1: Replace the placeholder values below (pub-sub must be base64-encoded JSON for Spring Cloud GCP), then:
#   kubectl apply -f k8s/secrets.yaml
# Option 2: Create from .env without storing values in this file:
#   ./k8s/scripts/apply-secrets-from-env.sh
#
# Do not commit real secret values. Consider adding secrets-generated.yaml to .gitignore if you generate from env.
---
apiVersion: v1
kind: Secret
metadata:
  name: pub-sub
  namespace: chronoflow
type: Opaque
stringData:
  # Must be base64-encoded service account JSON (Spring Cloud GCP encoded-key)
  pub-sub-service-account: "PLACEHOLDER"
---
apiVersion: v1
kind: Secret
metadata:
  name: file
  namespace: chronoflow
type: Opaque
stringData:
  file-service-account: "PLACEHOLDER"
---
apiVersion: v1
kind: Secret
metadata:
  name: firebase
  namespace: chronoflow
type: Opaque
stringData:
  account-json: "PLACEHOLDER"
  mobile-client-id: "PLACEHOLDER"
---
apiVersion: v1
kind: Secret
metadata:
  name: aws
  namespace: chronoflow
type: Opaque
stringData:
  region: "ap-southeast-1"
  access-key: "PLACEHOLDER"
  secret-key: "PLACEHOLDER"
