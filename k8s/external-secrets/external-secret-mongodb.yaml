# GSM secret id: MONGO_URI — full MongoDB / Firestore MongoDB-compatible connection string.
# Create the secret in Secret Manager before applying.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-from-gcp-sm
  namespace: chronoflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: mongodb
    creationPolicy: Owner
  data:
    - secretKey: uri
      remoteRef:
        key: MONGO_URI
