# GSM secret ids: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD (duplicated to prod-master-* and prod-slave-* keys).
# CLOUDSQL_INSTANCE_CONNECTION_NAME: project:region:instance (for cloud-sql-proxy; see k8s/cloudsql-proxy/).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-from-gcp-sm
  namespace: chronoflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: database
    creationPolicy: Owner
  data:
    - secretKey: prod-master-db-host
      remoteRef:
        key: DB_HOST
    - secretKey: prod-master-db-port
      remoteRef:
        key: DB_PORT
    - secretKey: prod-master-db-user
      remoteRef:
        key: DB_USER
    - secretKey: prod-master-db-password
      remoteRef:
        key: DB_PASSWORD
    - secretKey: cloudsql-instance-connection-name
      remoteRef:
        key: CLOUDSQL_INSTANCE_CONNECTION_NAME
    - secretKey: prod-slave-db-host
      remoteRef:
        key: DB_HOST
    - secretKey: prod-slave-db-port
      remoteRef:
        key: DB_PORT
    - secretKey: prod-slave-db-user
      remoteRef:
        key: DB_USER
    - secretKey: prod-slave-db-password
      remoteRef:
        key: DB_PASSWORD
