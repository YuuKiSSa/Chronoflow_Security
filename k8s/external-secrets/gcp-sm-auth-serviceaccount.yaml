# Kubernetes SA used by ClusterSecretStore for GCP Secret Manager (Workload Identity).
# 1) Create a GCP SA, grant roles/secretmanager.secretAccessor on secrets or project.
# 2) Bind WI: gcloud iam service-accounts add-iam-policy-binding \
#      ${ESO_GCP_SERVICE_ACCOUNT} --role=roles/iam.workloadIdentityUser \
#      --member="serviceAccount:${GCP_PROJECT_ID}.svc.id.goog[external-secrets/eso-gcp-sm]"
# 3) envsubst: ESO_GCP_SERVICE_ACCOUNT — must be the GCP SA email only (e.g. eso-gcp-sm@PROJECT.iam.gserviceaccount.com).
#    Do not paste "iam.gke.io/gcp-service-account=..." here; that breaks Workload Identity token exchange.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-gcp-sm
  namespace: external-secrets
  annotations:
    iam.gke.io/gcp-service-account: "${ESO_GCP_SERVICE_ACCOUNT}"
