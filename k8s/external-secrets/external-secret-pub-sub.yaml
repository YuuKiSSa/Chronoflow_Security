# GSM secret id must match Terraform default: PUB_SUB_SERVICE_ACCOUNT_JSON
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pub-sub-from-gcp-sm
  namespace: chronoflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: pub-sub
    creationPolicy: Owner
  data:
    - secretKey: pub-sub-service-account
      remoteRef:
        key: PUB_SUB_SERVICE_ACCOUNT_JSON
