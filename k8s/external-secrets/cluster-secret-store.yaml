# envsubst: GCP_PROJECT_ID
# Requires: External Secrets Operator (CRDs) on cluster; eso-gcp-sm + Workload Identity (see gcp-sm-auth-serviceaccount.yaml).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: "${GCP_PROJECT_ID}"
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: eso-gcp-sm
            namespace: external-secrets
