# GSM secret ids: AWS_ACCESS_KEY, AWS_SECRET_KEY. Region is set inline in target.template below.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aws-from-gcp-sm
  namespace: chronoflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: aws
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      data:
        region: ap-southeast-1
  data:
    - secretKey: access-key
      remoteRef:
        key: AWS_ACCESS_KEY
    - secretKey: secret-key
      remoteRef:
        key: AWS_SECRET_KEY
