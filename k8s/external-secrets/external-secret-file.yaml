# GSM secret id must match Terraform default: GCP_SERVICE_ACCOUNT_JSON
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: file-from-gcp-sm
  namespace: chronoflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: file
    creationPolicy: Owner
  data:
    - secretKey: file-service-account
      remoteRef:
        key: GCP_SERVICE_ACCOUNT_JSON
