# GSM secret id: REDIS_PASSWORD — Memorystore auth string (or password for Redis with --requirepass).
# Create in Secret Manager before applying. If Redis has no auth, omit this ExternalSecret or use a placeholder and do not mount it in apps.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth-from-gcp-sm
  namespace: chronoflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: redis-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: REDIS_AUTH
