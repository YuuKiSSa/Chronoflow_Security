apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: chronoflow
  labels:
    app: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: chronoflow
  labels:
    app: gateway
  annotations:
    kubernetes.io/ingress.global-static-ip-name: lb-ip-dev
spec:
  defaultBackend:
    service:
      name: gateway
      port:
        number: 80