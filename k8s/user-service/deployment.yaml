apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: chronoflow
  # secretKeyRef Secrets (database, pub-sub, firebase) are synced from GCP SM by ExternalSecrets in k8s/external-secrets/.
  labels:
    app: user-service
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        version: v1
    spec:
      tolerations:
        - key: "node.gke.io/balloon-pod-resize"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: user-service
          image: asia-southeast1-docker.pkg.dev/chronoflow-1/user-service/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: PROD_MASTER_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-host
            - name: PROD_MASTER_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-port
            - name: PROD_MASTER_DB_USER
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-user
            - name: PROD_MASTER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-password
            - name: PROD_SLAVE_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-slave-db-host
            - name: PROD_SLAVE_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-slave-db-port
            - name: PROD_SLAVE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-slave-db-user
            - name: PROD_SLAVE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-slave-db-password
            - name: PROD_REDIS_HOST
              value: "redis.chronoflow.svc.cluster.local"
            - name: PROD_REDIS_PORT
              value: "6379"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
            - name: SERVER_PORT
              value: "8081"
            - name: NACOS_HOST
              value: "nacos.chronoflow.svc.cluster.local"
            - name: NACOS_PORT
              value: "8848"
            - name: NACOS_USERNAME
              value: "nacos"
            - name: NACOS_PASSWORD
              value: "nacos"
            - name: PUB_SUB_SERVICE_ACCOUNT_JSON
              valueFrom:
                secretKeyRef:
                  name: pub-sub
                  key: pub-sub-service-account
            - name: GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: noti-config
                  key: gcp.project.id
            - name: FIREBASE_SERVICE_ACCOUNT_JSON
              valueFrom:
                secretKeyRef:
                  name: firebase
                  key: account-json
            - name: MOBILE_SSO_JWKS
              value: https://www.googleapis.com/oauth2/v3/certs
            - name: MOBILE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: firebase
                  key: mobile-client-id
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "800Mi"
              cpu: "400m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 240
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      restartPolicy: Always
      terminationGracePeriodSeconds: 30