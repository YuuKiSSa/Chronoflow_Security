apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: chronoflow
  labels:
    app: mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard   # GKE default; uncomment and set if using a different class
