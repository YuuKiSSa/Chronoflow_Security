# MySQL root and Nacos DB user. Change the values before applying (or delete and create via kubectl).
# Nacos uses secret "nacos-mysql" with key "password" (same value as nacos-password below).
apiVersion: v1
kind: Secret
metadata:
  name: mysql
  namespace: chronoflow
type: Opaque
stringData:
  root-password: "PLACEHOLDER"   # MYSQL_ROOT_PASSWORD
  nacos-password: "PLACEHOLDER"  # Nacos DB user password; use same value in nacos-mysql below
---
apiVersion: v1
kind: Secret
metadata:
  name: nacos-mysql
  namespace: chronoflow
type: Opaque
stringData:
  password: "PLACEHOLDER"   # Must match mysql secret nacos-password (Nacos connects as user "nacos")
