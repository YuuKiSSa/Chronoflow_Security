apiVersion: v1
kind: Service
metadata:
  name: nacos-headless
  namespace: chronoflow
  labels:
    app: nacos
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8848
      name: client
      targetPort: 8848
    - port: 9848
      name: client-rpc
      targetPort: 9848
    - port: 9849
      name: raft-rpc
      targetPort: 9849
    - port: 7848
      name: old-raft-rpc
      targetPort: 7848
  selector:
    app: nacos
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: chronoflow
  labels:
    app: nacos
spec:
  type: ClusterIP
  ports:
    - port: 8848
      name: http
      targetPort: 8848
      protocol: TCP
    - port: 9848
      name: grpc
      targetPort: 9848
      protocol: TCP
  selector:
    app: nacos
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nacos
  namespace: chronoflow
  # secretKeyRef Secret database is synced from GCP SM by k8s/external-secrets/external-secret-database.yaml
spec:
  serviceName: nacos-headless
  replicas: 1  # Use 1 for dev; set to 2+ and MODE=cluster for HA
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.4.2
          ports:
            - containerPort: 8848
              name: client
            - containerPort: 9848
              name: client-rpc
            - containerPort: 9849
              name: raft-rpc
            - containerPort: 7848
              name: old-raft-rpc
          env:
            - name: SPRING_DATASOURCE_PLATFORM
              value: "mysql"
            - name: MODE
              value: "standalone"
            - name: MYSQL_SERVICE_HOST
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-host
            - name: MYSQL_SERVICE_DB_NAME
              value: "nacos"
            - name: MYSQL_SERVICE_PORT
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-port
            - name: MYSQL_SERVICE_USER
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-user
            - name: MYSQL_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database
                  key: prod-master-db-password
            - name: MYSQL_SERVICE_DB_PARAM
              value: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=true&allowPublicKeyRetrieval=true"
            - name: NACOS_SERVER_PORT
              value: "8848"
            - name: NACOS_APPLICATION_PORT
              value: "8848"
            - name: PREFER_HOST_MODE
              value: "hostname"
          readinessProbe:
            httpGet:
              path: /nacos/v1/console/health/readiness
              port: 8848
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "800m"