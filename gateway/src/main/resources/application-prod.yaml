spring:
  # Redis config
  data:
    redis:
      host: ${PROD_REDIS_HOST}
      port: ${PROD_REDIS_PORT}
      password: ${PROD_REDIS_PASSWORD}
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://chronoflow.site"
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowed-methods:
              - "GET"
              - "POST"
              - "DELETE"
              - "PATCH"
              - "PUT"
              - "OPTIONS"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 360000